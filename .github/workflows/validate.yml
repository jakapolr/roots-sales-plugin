name: Validate plugin

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Structure & manifest validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate plugin structure
        run: python3 scripts/validate_plugin.py
